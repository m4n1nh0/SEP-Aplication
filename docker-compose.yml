services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: sep_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot123 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  sep-monolith:
    profiles: ["monolith"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVE_CLIENT: "true"
      CLIENT_DIST_DIR: /app/client/dist
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: sep_db
      JWT_SECRET: dev_monolith_change_me_64_chars_minimum_sep_local_secret
      CLIENT_URL: http://localhost:3001
      APP_URL: http://localhost:3001
      RUN_MIGRATIONS: "true"
      SEEDS_RESET: "false"
      LOG_LEVEL: info
      LOG_DIR: /app/logs
      UPLOAD_DIR: /app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./server/logs:/app/logs
      - ./server/uploads:/app/uploads

  api:
    profiles: ["split"]
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVE_CLIENT: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: sep_db
      JWT_SECRET: dev_split_change_me_64_chars_minimum_sep_local_secret
      CLIENT_URL: http://localhost:5173
      APP_URL: http://localhost:3001
      RUN_MIGRATIONS: "true"
      SEEDS_RESET: "false"
      LOG_LEVEL: info
      LOG_DIR: /app/logs
      UPLOAD_DIR: /app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./server/logs:/app/logs
      - ./server/uploads:/app/uploads

  web:
    profiles: ["split"]
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    environment:
      PORT: 8080
    depends_on:
      - api
    ports:
      - "5173:8080"

volumes:
  mysql_data:
